# : Manager [[[

[mgr]
cwd = { fg = "#1b1b1f" }

# Find
find_keyword = { fg = "#ba1a1a", bold = true, italic = true, underline = true }
find_position = { fg = "#ba1a1a", bold = true, italic = true }

# Marker
marker_copied = { fg = "#ffd8ed", bg = "#ffd8ed" }
marker_cut = { fg = "#ffd8ed", bg = "#ffd8ed" }
marker_marked = { fg = "#ba1a1a", bg = "#ba1a1a" }
marker_selected = { fg = "#78536b", bg = "#78536b" }

# Count
count_copied = { fg = "#2e1126", bg = "#ffd8ed" }
count_cut = { fg = "#2e1126", bg = "#ffd8ed" }
count_selected = { fg = "#ffffff", bg = "#78536b" }

# Border
border_style  = { fg = "#5056a9" }

# : ]]]


# : Status [[[

[status]
overall = { fg = "#5056a9" }
sep_left  = { open = "¯éÂ", close = "¯é┤" }
sep_right = { open = "¯éÂ", close = "¯é┤" }

# Progress
progress_label = { bold = true }
progress_normal = { fg = "#5056a9", bg = "#fcf8fd" }
progress_error = { fg = "#ba1a1a", bg = "#fcf8fd" }

# Permissions
perm_type = { fg = "#5c5d72" }
perm_write = { fg = "#78536b" }
perm_exec = { fg = "#ba1a1a" }
perm_read = { fg = "#ffd8ed" }
perm_sep = { fg = "#e0e0ff" }

# : ]]]


# : Mode [[[

[mode]

normal_main = { bg = "#5056a9", fg = "#ffffff", bold = true }
normal_alt  = { bg = "#e4e1ec", fg = "#46464f" }

select_main = { bg = "#5c5d72", fg = "#ffffff", bold = true }
select_alt  = { bg = "#e4e1ec", fg = "#46464f" }

unset_main = { bg = "#78536b", fg = "#ffffff", bold = true }
unset_alt  = { bg = "#e4e1ec", fg = "#46464f" }

# : ]]]


# : Input [[[

[input]
border = { fg = "#5056a9" }
title = {}
value = { fg = "#1b1b1f" }
selected = { reversed = true }

# : ]]]


# : Tabs [[[

[tabs]
active = { fg = "#fcf8fd", bold = true, bg = "#5056a9" }
inactive = { fg = "#5c5d72", bg = "#fcf8fd" }
sep_inner = { open = "", close = "" }

# : ]]]


# : Completion [[[

[cmp]
border = { fg = "#5056a9", bg = "#ffffff" }

# : ]]]


# : Tasks [[[

[tasks]
border = { fg = "#5056a9" }
title = {}
hovered = { fg = "#ffd8ed", underline = true }

# : ]]]


# : Which [[[

[which]
cols = 3
mask = { bg = "#fcf8fd" }
cand = { fg = "#5056a9" }
rest = { fg = "#ffffff" }
desc = { fg = "#1b1b1f" }
separator = " ÔûÂ "
separator_style = { fg = "#1b1b1f" }

# : ]]]

# : Spotter [[[

[spot]
border   = { fg = "#5056a9" }
title    = { fg = "#5056a9" }
tbl_col  = { fg = "#1b1b1f" }
tbl_cell = { fg = "#1b1b1f", bg = "#fcf8fd" }

# : ]]]


# : Help [[[

[help]
on = { fg = "#1b1b1f" }
run = { fg = "#1b1b1f" }
hovered = { reversed = true, bold = true }
footer = { fg = "#ffffff", bg = "#5c5d72" }

# : ]]]


# : Notify [[[

[notify]
title_info = { fg = "#78536b" }
title_warn = { fg = "#5056a9" }
title_error = { fg = "#ba1a1a" }

# : ]]]


# : File-specific styles [[[

[filetype]

rules = [
    # Images
    { mime = "image/*", fg = "#94e2d5" },

    # Media
    { mime = "{audio,video}/*", fg = "#f9e2af" },

    # Archives
    { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "#f5c2e7" },

    # Documents
    { mime = "application/{pdf,doc,rtf}", fg = "#a6e3a1" },

    # Special files
    { mime = "*", is = "orphan", fg = "#410002", bg = "#ffdad6" },
    { mime = "application/*exec*", fg = "#ba1a1a" },

    # Fallback
    { url = "*", fg = "#1b1b1f" },
    { url = "*/", fg = "#5056a9" },
]

# : ]]]

