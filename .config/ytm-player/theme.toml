# Бело-фиолетовая пастельная схема для ytm-player
[theme]
dark = false                  # Обязательно выключаем темную тему

# Основные цвета интерфейса
primary = "#9d7cd8"           # Пастельный фиолетовый (кнопки, активные элементы)
secondary = "#b4befe"         # Мягкий пурпурный (второстепенные акценты)
accent = "#cba6f7"            # Светло-фиолетовый (фокус и выделение)

# Фон и текст
background = "#faf8fc"        # Мягкий белый фон (под цвет Alacritty)
surface = "#f2f0f5"           # Фон карточек и списков (чуть темнее основного)
panel = "#e0def4"             # Границы окон и разделители
foreground = "#4a3e56"        # Темно-фиолетовый читаемый текст

# Состояния элементов
success = "#c3e88d"           # Пастельный зеленый (активный трек / плеер)
warning = "#ffc777"           # Пастельный желтый
error = "#ff757f"             # Пастельный красный
