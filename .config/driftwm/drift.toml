[decorations]
# Включить или выключить тени глобально (true/false)
shadow = true

# Радиус размытия тени в пикселях
# Чтобы сделать тень мягче (как на референсе), увеличьте это значение (например, до 16 или 20)
shadow_radius = 16

# Цвет тени в формате RGBA (Красный, Зеленый, Синий, Альфа-прозрачность)
# Последняя цифра отвечает за силу тени. Попробуйте выставить 0.2 или 0.3 для легкой дымки
shadow_color = [0.0, 0.0, 0.0, 0.25]

# Смещение тени по осям X и Y (0, 0 — тень падает равномерно со всех сторон)
shadow_offset = [0, 0]
