# --- МАКСИМАЛЬНЫЙ FPS И ОПТИМИЗАЦИЯ ---
backend = "xrender";
vsync = false;

# Рендерить только изменившиеся пиксели (снижает нагрузку на CPU до нуля)
use-damage = true;

# --- ЗАКРУГЛЕНИЕ УГЛОВ (12 пикселей) ---
corner-radius = 12;

rounded-corners-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'"
];

# --- РАВНОМЕРНОЕ БЕЛОЕ СВЕЧЕНИЕ СО ВСЕХ СТОРОН ---
shadow = true;
shadow-radius = 16;
shadow-opacity = 0.95;

# Идеальное центрирование ореола без смещения вправо/вниз
shadow-offset-x = -16;
shadow-offset-y = -16;

# Принудительная перезапись цвета тени в белый для бэкенда xrender
win-blend-color = "#ffffff";
shadow-color = "#ffffff";

# Дублирующие параметры цвета для совместимости со старыми видеокартами
shadow-red = 1.0;
shadow-green = 1.0;
shadow-blue = 1.0;

# --- ОТКЛЮЧЕНИЕ ТЯЖЕЛЫХ ЭФФЕКТОВ ДЛЯ ВЫСОКОГО FPS ---
fading = false;
blur-background = false;

# Исключения для теней (чистый синтаксис без предупреждений)
shadow-exclude = [
  "window_type = 'dock'",
  "_GTK_FRAME_EXTENTS@"
];
